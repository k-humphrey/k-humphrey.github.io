<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes"> 
    <meta name="apple-mobile-web-app-status-bar-style" content="black"> 
    <title>What's the Weather?</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="d-flex justify-content-center align-items-center min-vh-100">
        <!--Card-->
        <div class="card-transparent col-10">
            <img src="images/ClearDay.png" id="imageWeather" class="card-img-top" alt="Image of a clear day">
            <div class="card-body">
                <!--Current info-->
                <h1 class="text-center" id="txtCurrentTemp"></h1>
                <h2 class="text-center" id="txtCurrentRain"></h2>
                <h4 class="text-center" id="txtCurrentCity"></h4>
                <form class="col-6 mx-auto">
                    <select class="form-select text-center" style="background-color: rgb(191, 220, 220);" id="selCity">
                        <option value="">Select a city</option>
                        <option value="Cookeville">Cookeville, TN</option>
                        <option value="Clinton">Clinton, TN</option>
                        <option value="Atlanta">Atlanta, GA</option>
                    </select>
                </form>

                <!--Todays info-->
                <h2>Today's Forecast</h2>
                <div class="container my-4">
                    <div class="d-flex overflow-auto gap-3 py-2" id="divDay">
                        <!--hourly-->
                    </div>
                </div>

                <h2>This Week's Forecast</h2>
                <div class="container my-4">
                    <div class="d-flex overflow-auto gap-3 py-2" id="divWeek">
                        <!--week-->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <p>Weather Data provided by <a href="https://open-meteo.com/en/docs" class="link-primary">Open Meteo</a> </p>
    <!--Scripts-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>
</html>
